<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EIG Document Verification Portal</title>

  <!-- ============================================================
       CONFIGURATION
       ============================================================ -->
  <script>
    const CONFIG = {
      SECRET:        "eig2-nXeaYVK4dTXeGmq930mtLyCBbZ7nw8oy",
      COMPANY_NAME:  "Enrichers Investment Group",
      COMPANY_SHORT: "EIG",
      CONTACT_EMAIL: "compliance@enrichers.com.pk",
    };
  </script>
  <!-- ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F7F6F3;
      --surface:      #FFFFFF;
      --border:       #E4E2DC;
      --text-primary: #1A1917;
      --text-muted:   #6B6963;
      --text-faint:   #A09D97;
      --green-bg:     #EAF3DE;
      --green-text:   #27500A;
      --green-border: #B0D47A;
      --red-bg:       #FCEBEB;
      --red-text:     #501313;
      --red-border:   #F09595;
      --amber-bg:     #FAEEDA;
      --amber-text:   #633806;
      --amber-border: #FAC775;
      --mono:         'JetBrains Mono', monospace;
      --sans:         'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo { display: flex; align-items: center; gap: 11px; }
    .header-text { display: flex; flex-direction: column; line-height: 1.25; }
    .header-company { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .header-portal { font-size: 11px; font-weight: 500; color: var(--text-faint); letter-spacing: 0.02em; }
    .logo-mark {
      width: 34px; height: 34px;
      background: var(--text-primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-faint); }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .status-banner {
      padding: 2.25rem 2rem 1.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
    .status-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .status-icon svg { width: 30px; height: 30px; }
    .status-icon.checking  { background: var(--amber-bg);  color: var(--amber-text); }
    .status-icon.valid     { background: var(--green-bg);  color: var(--green-text); }
    .status-icon.invalid   { background: var(--red-bg);    color: var(--red-text);   }

    .status-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    .status-title.valid   { color: var(--green-text); }
    .status-title.invalid { color: var(--red-text);   }
    .status-title.checking { color: var(--amber-text); }

    .status-desc { font-size: 13.5px; color: var(--text-muted); max-width: 340px; line-height: 1.6; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
      border: 1px solid;
    }
    .badge.valid   { background: var(--green-bg);  color: var(--green-text);  border-color: var(--green-border); }
    .badge.invalid { background: var(--red-bg);    color: var(--red-text);    border-color: var(--red-border);   }
    .badge.checking{ background: var(--amber-bg);  color: var(--amber-text);  border-color: var(--amber-border); }

    .doc-details { padding: 1.5rem 2rem; }
    .detail-heading {
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-faint); margin-bottom: 1rem;
    }
    .detail-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 1rem; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-muted); flex-shrink: 0; }
    .detail-value { font-weight: 600; text-align: right; }
    .detail-value.mono { font-family: var(--mono); font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .detail-value.faint { color: var(--text-faint); font-weight: 500; font-style: italic; }

    .state-box { padding: 1.5rem 2rem 2rem; text-align: center; }
    .state-box p { font-size: 13.5px; color: var(--text-muted); line-height: 1.65; }

    .contact-box {
      margin: 0 2rem 1.75rem;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: left;
    }
    .contact-box strong { color: var(--text-primary); font-weight: 600; }
    .contact-box a { color: var(--text-primary); font-weight: 600; text-decoration: none; }
    .contact-box a:hover { text-decoration: underline; }

    footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-faint); line-height: 1.7; }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      main { padding: 1.5rem 0.75rem 3rem; }
      .doc-details, .status-banner, .state-box { padding-left: 1.25rem; padding-right: 1.25rem; }
      .contact-box { margin-left: 1.25rem; margin-right: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F7F6F3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="12" y2="17"/>
      </svg>
    </div>
    <div class="header-text">
      <span class="header-company" id="company-name">Enrichers Investment Group</span>
      <span class="header-portal">Document Verification Portal</span>
    </div>
  </div>
  <span class="header-tag">Secure verify</span>
</header>

<main>
  <div class="card" id="card">
    <div class="state-box" id="state-loading">
      <div style="display:flex;justify-content:center;margin-bottom:14px">
        <div class="status-icon checking">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </div>
      </div>
      <p style="font-size:14px;color:var(--text-muted)">Verifying document…</p>
    </div>
  </div>
</main>

<footer id="footer">
  &copy; <span id="footer-year"></span> <strong id="footer-company">Enrichers Investment Group</strong>. All rights reserved.<br/>
  This page uses cryptographic signature verification to confirm document authenticity.
</footer>

<script>
(async () => {
  document.getElementById('company-name').textContent = CONFIG.COMPANY_NAME;
  document.getElementById('footer-company').textContent = CONFIG.COMPANY_NAME;
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  const card = document.getElementById('card');

  async function hmac(secret, message) {
    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey(
      'raw', enc.encode(secret),
      { name: 'HMAC', hash: 'SHA-256' },
      false, ['sign']
    );
    const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
    return btoa(String.fromCharCode(...new Uint8Array(sig)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function fromb64url(s) {
    try { return JSON.parse(atob(s.replace(/-/g, '+').replace(/_/g, '/'))); }
    catch { return null; }
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }); }
    catch { return iso; }
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const iconCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
  const iconX     = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
  const iconDoc   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

  function renderValid(p) {
    card.innerHTML = `
      <div class="status-banner">
        <div class="status-icon valid">${iconCheck}</div>
        <div class="status-title valid">Document verified</div>
        <span class="badge valid">${iconCheck} Status — Valid</span>
        <p class="status-desc">This document is authentic and was issued by ${escHtml(CONFIG.COMPANY_NAME)}.</p>
      </div>
      <div class="doc-details">
        <div class="detail-heading">Document details</div>
        <div class="detail-row"><span class="detail-label">Recipient</span><span class="detail-value">${escHtml(p.name)}</span></div>
        <div class="detail-row"><span class="detail-label">Reference no.</span><span class="detail-value mono">${escHtml(p.id)}</span></div>
        <div class="detail-row"><span class="detail-label">Document type</span><span class="detail-value">${escHtml(p.type)}</span></div>
        <div class="detail-row"><span class="detail-label">Issued by</span><span class="detail-value">${escHtml(CONFIG.COMPANY_NAME)}</span></div>
        <div class="detail-row"><span class="detail-label">Issuing office</span><span class="detail-value">${escHtml(p.office || '—')}</span></div>
        <div class="detail-row"><span class="detail-label">Date of issue</span><span class="detail-value">${formatDate(p.date)}</span></div>
        <div class="detail-row"><span class="detail-label">Authorised signatory</span><span class="detail-value">${escHtml(p.signatory || '—')}</span></div>
      </div>`;
  }

  function renderInvalid() {
    card.innerHTML = `
      <div class="status-banner">
        <div class="status-icon invalid">${iconX}</div>
        <div class="status-title invalid">Document not recognised</div>
        <span class="badge invalid">${iconX} Status — Invalid</span>
        <p class="status-desc">This QR code does not match any document in ${escHtml(CONFIG.COMPANY_SHORT)}'s records. It may be invalid, expired, or tampered with.</p>
      </div>
      <div class="doc-details">
        <div class="detail-heading">Reference lookup</div>
        <div class="detail-row"><span class="detail-label">Reference status</span><span class="detail-value faint">Not found in system</span></div>
      </div>
      <div class="contact-box">
        <strong>Contact ${escHtml(CONFIG.COMPANY_SHORT)} directly</strong><br/>
        If you believe this document is genuine, please reach out before relying on it:<br/>
        <a href="mailto:${CONFIG.CONTACT_EMAIL}">${escHtml(CONFIG.CONTACT_EMAIL)}</a>
      </div>`;
  }

  function renderNoToken() {
    card.innerHTML = `
      <div class="status-banner">
        <div class="status-icon checking">${iconDoc}</div>
        <div class="status-title checking">No document scanned</div>
        <p class="status-desc">This portal verifies documents issued by ${escHtml(CONFIG.COMPANY_NAME)}. Scan the QR code printed on an official document to verify it here.</p>
      </div>
      <div class="state-box">
        <p>If you received a physical or digital document bearing an ${escHtml(CONFIG.COMPANY_SHORT)} QR code, scan it with your phone's camera to be brought here automatically with the result.</p>
      </div>
      <div class="contact-box">
        <strong>Contact ${escHtml(CONFIG.COMPANY_SHORT)}</strong><br/>
        <a href="mailto:${CONFIG.CONTACT_EMAIL}">${escHtml(CONFIG.CONTACT_EMAIL)}</a>
      </div>`;
  }

  const params = new URLSearchParams(window.location.search);
  const raw = params.get('t');

  if (!raw) { renderNoToken(); return; }

  const parts = raw.split('.');
  if (parts.length !== 2) { renderInvalid(); return; }

  const [encoded, sig] = parts;
  const payload = fromb64url(encoded);

  if (!payload) { renderInvalid(); return; }

  const expectedSig = await hmac(CONFIG.SECRET, encoded);

  if (sig !== expectedSig) { renderInvalid(); return; }

  if (payload.exp) {
    const expDate = new Date(payload.exp + 'T23:59:59');
    if (Date.now() > expDate.getTime()) { renderInvalid(); return; }
  }

  renderValid(payload);
})();
</script>

</body>
</html>
